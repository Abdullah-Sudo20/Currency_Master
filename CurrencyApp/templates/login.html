<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            font-family:Arial;
        }

        .login-box{
            width:400px;
            padding:40px;
            background:rgba(255,255,255,0.08);
            border-radius:20px;
            backdrop-filter:blur(15px);
            box-shadow:0 0 40px rgba(0,0,0,0.4);
            color:white;
        }

        .login-box h1{
            text-align:center;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:25px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0284c7;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h1>User Login</h1>

    <form action="/loginAction/" method="post">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
